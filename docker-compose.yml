# Floqi 로컬 개발 환경 — Supabase CLI 보조 서비스
# Supabase(Auth + DB + Storage 등)는 `supabase start`로 관리
# 이 파일은 Supabase CLI가 제공하지 않는 서비스만 포함
#
# 전체 시작: make dev-up
# 전체 종료: make dev-down

services:
  # ============================================================
  # Redis 7 (Upstash 대체)
  # Go Worker의 Asynq 작업 큐용
  # Next.js rate limiting은 인메모리 fallback 사용 (Edge Runtime 제약)
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: floqi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:
    driver: local
