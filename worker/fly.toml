# fly.toml file generated for Floqi Worker

app = "floqi-worker"
primary_region = "nrt" # Tokyo, Japan (adjust as needed: sfo, ord, lhr, syd, etc.)

[build]
  builder = "dockerfile"
  dockerfile = "./Dockerfile"

[env]
  # ---- Database (Supabase PostgreSQL) ----
  DATABASE_URL = "postgresql://postgres:PASSWORD@db.PROJECT.supabase.co:5432/postgres"

  # ---- Redis (Upstash) ----
  REDIS_ADDR = "HOST.upstash.io:6379"
  REDIS_PASSWORD = "PASSWORD"

  # ---- Encryption ----
  # Generate with: openssl rand -hex 32
  TOKEN_ENCRYPTION_KEY = "your_64_hex_character_key_here"

  # ---- LLM (Anthropic Claude) ----
  ANTHROPIC_API_KEY = "sk-ant-YOUR_API_KEY"

  # ---- Google OAuth ----
  GOOGLE_CLIENT_ID = "YOUR_CLIENT_ID.apps.googleusercontent.com"
  GOOGLE_CLIENT_SECRET = "YOUR_CLIENT_SECRET"

  # ---- External APIs ----
  NEWS_API_KEY = "YOUR_NEWS_API_KEY"
  OPENWEATHERMAP_API_KEY = "YOUR_OPENWEATHERMAP_KEY"

  # ---- Application Config ----
  LOG_LEVEL = "info"
  ENVIRONMENT = "production"

[[services]]
  internal_port = 8080
  processes = ["app"]

  [[services.ports]]
    port = 8080
    handlers = ["http"]

  [[services.tcp_checks]]
    grace_period = "5s"
    interval = "15s"
    timeout = "2s"
    address = "0.0.0.0:8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[checks]
  [checks.http_check]
    type = "http"
    interval = "10s"
    timeout = "5s"
    grace_period = "5s"
    method = "GET"
    path = "/health"
    protocol = "http"
    tls_skip_verify = false
