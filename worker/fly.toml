# fly.toml file generated for Floqi Worker

app = "floqi-worker"
primary_region = "nrt" # Tokyo, Japan (adjust as needed: sfo, ord, lhr, syd, etc.)

[build]
  builder = "dockerfile"
  dockerfile = "./Dockerfile"

[env]
  LOG_LEVEL = "info"
  ENVIRONMENT = "production"

[[services]]
  internal_port = 8080
  processes = ["app"]

  [[services.ports]]
    port = 8080
    handlers = ["http"]

  [[services.tcp_checks]]
    grace_period = "5s"
    interval = "15s"
    timeout = "2s"
    address = "0.0.0.0:8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[checks]
  [checks.http_check]
    type = "http"
    interval = "10s"
    timeout = "5s"
    grace_period = "5s"
    method = "GET"
    path = "/health"
    protocol = "http"
    tls_skip_verify = false
